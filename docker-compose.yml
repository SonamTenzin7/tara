services:
  postgres:
    image: postgres:16-alpine
    container_name: tara_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: tara_db
    ports:
      - "5432:5432"
    volumes:
      - tara_postgres_data:/var/lib/postgresql/data

  # Optional: pgAdmin web UI to browse the database
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: tara_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@tara.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres

volumes:
  tara_postgres_data:
