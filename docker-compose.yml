services:
  postgres:
    image: postgres:16-alpine
    container_name: tara_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: tara_db
    ports:
      - "5432:5432"
    volumes:
      - tara_postgres_data:/var/lib/postgresql/data

  # Optional: pgAdmin web UI to browse the database
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: tara_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@tara.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres

  redis:
    image: redis:7-alpine
    container_name: tara_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - tara_redis_data:/data
    command: redis-server --appendonly yes

volumes:
  tara_postgres_data:
  tara_redis_data:
